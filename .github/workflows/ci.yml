name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GITHUB_STEP_SUMMARY: /tmp/vitest-check-summary.md
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          version: '0.2.1'
          node-version: '24'
      - run: vp check
      - run: vp test run --project unit

  test-db:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          version: '0.2.1'
          node-version: '24'
      - name: Run Tests
        run: vp test run --project server

  test-visual:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          version: '0.2.1'
          node-version: '24'
      - name: Install Playwright Browsers
        run: vpx playwright install --with-deps --only-shell
      - name: Run Tests
        run: vp test run --project browser
