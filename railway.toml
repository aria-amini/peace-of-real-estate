[build]
builder = "RAILPACK"
buildCommand = "vp build"
preDeployCommand = "vp run db:push && vp run db:init"

[deploy]
runtime = "V2"
numReplicas = 1
startCommand = "vp run start"
healthcheckPath = "/"
sleepApplication = true
useLegacyStacker = false
ipv6EgressEnabled = false
restartPolicyType = "ALWAYS"
healthcheckTimeout = 300
