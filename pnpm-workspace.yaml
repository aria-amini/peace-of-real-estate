allowBuilds:
  core-js: true
  cpu-features: true
  esbuild: true
  msw: true
  protobufjs: true
  ssh2: true
minimumReleaseAgeExclude:
  - '@aamini/config'
  - '@aamini/lib'
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.22
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
